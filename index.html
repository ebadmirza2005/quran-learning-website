<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Boxicons CDN -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main>
        <div class="bg-[#FDFCF0] h-20 w-full items-center justify-between flex p-4 gap-4">
         <div class="flex gap-8">   
          <div class="flex items-center gap-2">  
           <i class='bx bxs-envelope text-2xl'></i>
           <p>someone@example.com</p>
          </div>
          <div class="flex items-center gap-2"> 
           <i class='bx bxs-phone text-2xl'></i>
           <p>+00 000 000 000</p>
          </div>
          <div class="flex items-center gap-2"> 
           <i class='bx bxs-map text-2xl'></i>
           <p>123 Main Street</p>
          </div>
         </div>  
           <img class="h-50 w-70" src="assets/bismillah.webp" alt="bismillah">
          <div class="flex gap-8"> 
           <div class="flex gap-2 items-center">
             <i class='bx bxs-sun text-2xl'></i>
             <p>Sunrise At: 5:30 AM</p>
           </div>
           <div class="flex gap-2 items-center">
             <i class='bx bxs-moon text-2xl'></i>
             <p>Sunset At: 5:30 PM</p>
           </div>
           <a href="#"><i class='bx bxl-facebook text-2xl'></i></a>
           <a href="#"><i class='bx bxl-linkedin mr-5 text-2xl'></i></a>
          </div>

        </div>
        <header class="flex items-center justify-evenly p-4 pl-8 font-bold">
            <h1 class="text-3xl">Website</h1>
            <nav>
                <ul class="flex gap-6">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div>
                <button class="bg-green-500 text-white px-4 py-2 rounded">Free Trial</button>
            </div>
        </header>
        <section class="section-hero flex items-center justify-center">
            <div class="hero-content">
                <h1 class="text-white md:text-7xl sm:text-6xl leading-35 animate-title">WORLD OF QURAN AT <span class="block text-green-500">FAAZ AL QURAN</span></h1>
                <button class="bg-green-500 w-50 text-white text-xl m-10 py-4 rounded animate-cta" style="margin-top: 30px;">Discover More</button>
            </div>
            <img class="h-160 animate-image" style="margin-top: 120px;" src="assets/hero-image.png" alt="person" >
        </section>
    </main>

</body>
</html>
